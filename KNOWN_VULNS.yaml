# KNOWN_VULNS — ground-truth vulnerability catalog
# Purpose: answer key for benchmarking Scantonomous scan findings against this app.
# Diff scanner output vs. this file: a hit on a `vulnerable_source` path == true positive;
# a hit on a `secure_source` path == false positive.
#
# Schema per entry:
#   id               stable slug for this vuln class
#   category         human-readable vulnerability class
#   cwe              primary CWE id(s)
#   owasp            OWASP Top 10 (2021) category
#   module           app-internal module/feature name
#   route            HTTP path to reach it (DAST)
#   parameter        injectable/tainted input(s) (DAST)
#   vulnerable_source source files that ARE vulnerable (SAST true-positive targets)
#   secure_source    hardened variant that is NOT vulnerable (false-positive test)
#   notes            context / caveats

app: bWAPP
full_name: buggy Web Application (bWAPP)
upstream: https://github.com/raesene/bWAPP
fork: https://github.com/tomj12k/bWAPP
language: PHP
scan_surface: [SAST-php, DAST-web]
catalog_notes: >
  bWAPP ships ~100 individual bug pages, each a top-level *.php file under app/.
  The app's own inventory is app/bugs.txt (also rendered by app/portal.php),
  organized against the OWASP Top 10 2013 (A1-A10) plus an "Other bugs" and
  "Extras" section. Because listing all ~100 pages 1:1 is noisy, this catalog
  GROUPS them into ~26 vulnerability-class entries; each entry lists the concrete
  bWAPP files that implement that class (verified present in app/). Every bug page
  also honors a runtime security-level selector (low/medium/high) rather than
  shipping separate hardened files, so secure_source is empty. Paths are relative
  to repo root.

vulns:
  - id: bwapp-html-injection
    category: HTML Injection (Reflected & Stored)
    cwe: [CWE-79]
    owasp: A03:2021-Injection
    route: /htmli_get.php
    parameter: [firstname, lastname, blog]
    vulnerable_source: [app/htmli_get.php, app/htmli_post.php, app/htmli_current_url.php, app/htmli_stored.php, app/iframei.php]
    secure_source: []

  - id: bwapp-sqli
    category: SQL Injection (GET/POST/AJAX/CAPTCHA/Login/Stored/Blind/SQLite/SOAP)
    cwe: [CWE-89]
    owasp: A03:2021-Injection
    route: /sqli_1.php
    parameter: [title, movie, login, password, search]
    vulnerable_source: [app/sqli_1.php, app/sqli_2.php, app/sqli_3.php, app/sqli_4.php, app/sqli_5.php, app/sqli_6.php, app/sqli_7.php, app/sqli_8-1.php, app/sqli_9.php, app/sqli_10-1.php, app/sqli_11.php, app/sqli_12.php, app/sqli_13.php, app/sqli_14.php, app/sqli_15.php, app/sqli_16.php, app/sqli_17.php, app/sqli_drupal.php]
